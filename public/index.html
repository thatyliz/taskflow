<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface2: #1e2128;
      --border: #2a2d36; --border2: #363a45;
      --text: #e8eaf0; --text2: #8b8fa8; --text3: #5a5e72;
      --accent: #6c8cff; --accent-h: #4f72f5;
      --green: #34d399; --yellow: #fbbf24; --red: #f87171; --blue: #60a5fa;
      --radius: 10px; --radius-lg: 16px;
    }
    html { font-size: 15px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* Header */
    .header { position: sticky; top: 0; z-index: 10; background: rgba(14,15,17,.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: .5rem; font-size: 1.15rem; font-weight: 600; }
    .brand-icon { color: var(--accent); }
    .brand-badge { font-size: .65rem; font-weight: 600; text-transform: uppercase; padding: .15rem .45rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--text2); }
    .header-nav { display: flex; gap: .25rem; }
    .btn-icon { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: var(--radius); background: transparent; border: none; cursor: pointer; color: var(--text2); text-decoration: none; transition: background .15s, color .15s; }
    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    /* Main */
    .main { max-width: 900px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .filters { display: flex; gap: .5rem; }

    /* Controls */
    .select, .input {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: .875rem;
      padding: .45rem .75rem; outline: none;
    }
    .select:focus, .input:focus { border-color: var(--accent); }
    .textarea { resize: vertical; min-height: 72px; width: 100%; }

    /* Buttons */
    .btn-primary { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1.1rem; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-ghost { padding: .5rem 1rem; border-radius: var(--radius); background: transparent; color: var(--text2); font-size: .875rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text2); }

    /* Tasks */
    .task-list { display: flex; flex-direction: column; gap: .5rem; }
    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: flex-start; gap: 1rem; }
    .task-card:hover { border-color: var(--border2); }
    .task-card.done { opacity: .55; }
    .task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border2); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; background: transparent; }
    .task-check.done { background: var(--green); border-color: var(--green); }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: .9375rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text2); }
    .task-meta { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-top: .35rem; }
    .chip { font-size: .7rem; font-weight: 600; text-transform: uppercase; padding: .15rem .5rem; border-radius: 4px; }
    .chip-status-pending     { background: rgba(251,191,36,.1); color: var(--yellow); }
    .chip-status-in_progress { background: rgba(96,165,250,.1);  color: var(--blue); }
    .chip-status-done        { background: rgba(52,211,153,.1);  color: var(--green); }
    .chip-priority-low       { background: rgba(90,94,114,.15);  color: var(--text3); }
    .chip-priority-medium    { background: rgba(251,191,36,.08); color: var(--yellow); }
    .chip-priority-high      { background: rgba(248,113,113,.1); color: var(--red); }
    .task-actions { display: flex; gap: .25rem; flex-shrink: 0; }
    .task-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: transparent; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; }
    .task-btn:hover { background: var(--surface2); color: var(--text); }
    .task-btn.delete:hover { background: rgba(248,113,113,.1); color: var(--red); }

    /* States */
    .empty-state { text-align: center; padding: 5rem 1rem; color: var(--text3); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: .3; }
    .loading-state { display: flex; justify-content: center; padding: 4rem; }
    .spinner { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--accent); animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal — TUDO inline aqui, zero dependência do CSS externo */
    #modalBackdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.65);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #modalBackdrop.open {
      display: flex;
    }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); width: 100%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
    .modal-header { padding: 1.25rem 1.5rem 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 1.1rem; font-weight: 600; }
    .modal-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: .5rem; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .label { font-size: .8125rem; font-weight: 500; color: var(--text2); }
    .required { color: var(--red); }
    .input { width: 100%; }
    .modal-error { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); border-radius: var(--radius); padding: .65rem .85rem; font-size: .8125rem; color: var(--red); display: none; }

    /* Toast */
    .toast-area { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: .5rem; z-index: 9999; }
    .toast { padding: .65rem 1rem; border-radius: var(--radius); font-size: .875rem; font-weight: 500; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); max-width: 320px; }
    .toast.success { border-color: rgba(52,211,153,.3); color: var(--green); }
    .toast.error   { border-color: rgba(248,113,113,.3); color: var(--red); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        TaskFlow
        <span class="brand-badge" id="envBadge">dev</span>
      </div>
      <nav class="header-nav">
        <a href="/metrics" target="_blank" class="btn-icon" title="Métricas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        </a>
        <a href="/health" target="_blank" class="btn-icon" title="Health">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <div class="filters">
        <select class="select" id="filterStatus">
          <option value="">Todos status</option>
          <option value="pending">Pendente</option>
          <option value="in_progress">Em andamento</option>
          <option value="done">Concluída</option>
        </select>
        <select class="select" id="filterPriority">
          <option value="">Todas prioridades</option>
          <option value="high">Alta</option>
          <option value="medium">Média</option>
          <option value="low">Baixa</option>
        </select>
      </div>
      <button class="btn-primary" id="newTaskBtn">+ Nova Tarefa</button>
    </div>

    <div id="taskList" class="task-list"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">◎</div>
      <p style="font-weight:500;color:#8b8fa8">Nenhuma tarefa encontrada</p>
      <p style="font-size:.85rem;margin-top:.35rem">Crie sua primeira tarefa clicando no botão acima.</p>
    </div>
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- MODAL -->
  <div id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Nova Tarefa</span>
        <button class="btn-icon" id="btnModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="label" for="fTitle">Título <span class="required">*</span></label>
          <input class="input" id="fTitle" type="text" placeholder="Título da tarefa…" maxlength="255" />
        </div>
        <div class="field">
          <label class="label" for="fDescription">Descrição</label>
          <textarea class="input textarea" id="fDescription" rows="3" placeholder="Detalhes (opcional)…"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label class="label" for="fPriority">Prioridade</label>
            <select class="select" id="fPriority">
              <option value="low">Baixa</option>
              <option value="medium" selected>Média</option>
              <option value="high">Alta</option>
            </select>
          </div>
          <div class="field" id="statusWrap" style="display:none">
            <label class="label" for="fStatus">Status</label>
            <select class="select" id="fStatus">
              <option value="pending">Pendente</option>
              <option value="in_progress">Em andamento</option>
              <option value="done">Concluída</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="label" for="fDueDate">Prazo</label>
          <input class="input" id="fDueDate" type="datetime-local" />
        </div>
        <div class="modal-error" id="modalError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="btnModalCancel">Cancelar</button>
        <button class="btn-primary" id="btnModalSave">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast-area" id="toastArea"></div>

  <script src="/js/app.js"></script>
</body>
</html>
